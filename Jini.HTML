<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#ff0080,#ff8c94);
            overflow:hidden;
        }

        .container{
            text-align:center;
            color:white;
            z-index:2;
        }

        h1{
            font-size:65px;
            animation:glow 2s infinite alternate;
        }

        h2{
            margin-top:15px;
            font-size:35px;
        }

        p{
            margin-top:20px;
            font-size:22px;
            line-height:35px;
        }

        .button-section{
            display:flex;
            justify-content:center;
            align-items:center;
            gap:25px;
            margin-top:35px;
        }

        .side-img{
            width:120px;
            height:120px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid white;
            box-shadow:0 0 20px white;
            animation:zoom 2s infinite alternate;
        }

        .btn{
            padding:14px 30px;
            border:none;
            border-radius:40px;
            background:white;
            color:#ff0066;
            font-size:22px;
            cursor:pointer;
            transition:0.3s;
            font-weight:bold;
        }

        .btn:hover{
            transform:scale(1.1);
            background:#ff0066;
            color:white;
        }

        @keyframes glow{

            from{
                text-shadow:
                0 0 10px white,
                0 0 20px white,
                0 0 30px #ff4d6d;
            }

            to{
                text-shadow:
                0 0 20px white,
                0 0 30px #ff4d6d,
                0 0 40px #ff4d6d;
            }
        }

        @keyframes zoom{

            from{
                transform:scale(1);
            }

            to{
                transform:scale(1.1);
            }
        }

        .heart{
            position:absolute;
            color:red;
            font-size:22px;
            animation:float 5s linear infinite;
            opacity:0.8;
        }

        @keyframes float{

            0%{
                transform:translateY(100vh);
                opacity:1;
            }

            100%{
                transform:translateY(-10vh);
                opacity:0;
            }
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>🎂 Happy Birthday 🎂</h1>

        <h2>Jini My Love ❤️</h2>

        <p>
            Wishing you lots of happiness,<br>
            success, love and beautiful memories.
        </p>

        <div class="button-section">

            <!-- Left Image -->
            <img src="jini1.jpeg" class="side-img">

            <!-- Button -->
            <button class="btn" onclick="showMessage()">
                Click Me
            </button>

            <!-- Right Image -->
            <img src="jini2.jpeg" class="side-img">

        </div>

    </div>

    <script>

        function showMessage(){

            alert("Happy Birthday My Wife ❤️🎂");

        }

        function createHeart(){

            const heart = document.createElement("div");

            heart.classList.add("heart");

            heart.innerHTML = "❤️ Jini ❤️";
            heart.style.fontSize = "24px";
            heart.style.fontWeight = "bold";
            heart.style.color = "white";
	    
            heart.style.left = Math.random() * 100 + "vw";

            heart.style.animationDuration =
            Math.random() * 3 + 2 + "s";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            },5000);
        }

        setInterval(createHeart,300);

    </script>

    <!-- Birthday Music -->

    <audio id="music" loop>
        <source src="song.mp3" type="audio/mp3">
    </audio>

    <script>

        document.body.addEventListener("click", function () {

            document.getElementById("music").play();

        });

    </script>

</body>

</html>
